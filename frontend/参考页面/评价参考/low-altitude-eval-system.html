<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>应急物资低空智慧运输 - 多元融合评价系统</title>
  <!-- ECharts 5.x CDN -->
  <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
  <!-- Font Awesome 6.x CDN -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    /* ============================================================
       低空应急智慧评价系统 - 全局样式
       主题：深色科技风（深蓝暗色）
       ============================================================ */

    /* ===== CSS变量定义 ===== */
    :root {
      --bg-primary: #0a1628;
      --bg-secondary: #0d1f3c;
      --bg-card: #0d1f3c;
      --border-color: #1a3a5c;
      --accent-cyan: #00d4ff;
      --accent-cyan-dim: rgba(0, 212, 255, 0.15);
      --text-primary: #e0e8f0;
      --text-secondary: #8b9dc3;
      --success: #00e676;
      --warning: #ffc400;
      --danger: #ff5252;
      --shadow-glow: 0 4px 20px rgba(0, 212, 255, 0.1);
      --radius-card: 8px;
      --radius-btn: 6px;
      --font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
    }

    /* ===== 全局重置 ===== */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100%;
      font-family: var(--font-family);
      background: var(--bg-primary);
      color: var(--text-primary);
      font-size: 14px;
      line-height: 1.5;
      overflow: hidden;
    }

    /* ===== 滚动条样式 ===== */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg-primary); }
    ::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--accent-cyan); }

    /* ===== 顶部导航栏 ===== */
    .top-nav {
      height: 56px;
      background: linear-gradient(90deg, #0a1628 0%, #0d1f3c 100%);
      border-bottom: 1px solid var(--border-color);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      position: relative;
      z-index: 100;
    }

    .nav-left {
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .nav-logo {
      font-size: 18px;
      font-weight: 700;
      color: var(--accent-cyan);
      display: flex;
      align-items: center;
      gap: 10px;
      text-shadow: 0 0 10px rgba(0, 212, 255, 0.3);
    }

    .nav-logo i { font-size: 22px; }

    .role-switcher {
      display: flex;
      gap: 8px;
      background: rgba(26, 58, 92, 0.5);
      border-radius: var(--radius-btn);
      padding: 4px;
    }

    .role-btn {
      padding: 6px 16px;
      border: none;
      border-radius: var(--radius-btn);
      background: transparent;
      color: var(--text-secondary);
      cursor: pointer;
      font-size: 13px;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .role-btn:hover {
      color: var(--text-primary);
      background: rgba(0, 212, 255, 0.1);
    }

    .role-btn.active {
      background: var(--accent-cyan);
      color: #0a1628;
      font-weight: 600;
      box-shadow: 0 0 12px rgba(0, 212, 255, 0.4);
    }

    .nav-right {
      display: flex;
      align-items: center;
      gap: 20px;
      color: var(--text-secondary);
      font-size: 13px;
    }

    .live-time {
      font-variant-numeric: tabular-nums;
      color: var(--accent-cyan);
      font-weight: 500;
    }

    /* ===== 主体布局 ===== */
    .main-layout {
      display: flex;
      height: calc(100vh - 56px - 36px);
      overflow: hidden;
    }

    /* ===== 左侧边栏 ===== */
    .sidebar {
      width: 260px;
      min-width: 260px;
      background: var(--bg-secondary);
      border-right: 1px solid var(--border-color);
      display: flex;
      flex-direction: column;
      overflow-y: auto;
    }

    .sidebar-header {
      padding: 16px;
      border-bottom: 1px solid var(--border-color);
      font-size: 12px;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .group-section {
      margin-bottom: 8px;
    }

    .group-title {
      padding: 10px 16px;
      font-size: 13px;
      font-weight: 600;
      color: var(--accent-cyan);
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(0, 212, 255, 0.05);
      border-left: 3px solid var(--accent-cyan);
    }

    .student-item {
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      transition: all 0.2s ease;
      border-left: 3px solid transparent;
      position: relative;
    }

    .student-item:hover {
      background: rgba(0, 212, 255, 0.05);
    }

    .student-item.active {
      background: var(--accent-cyan-dim);
      border-left-color: var(--accent-cyan);
    }

    .student-item.active .student-name {
      color: var(--accent-cyan);
      font-weight: 600;
    }

    .student-avatar {
      font-size: 24px;
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(26, 58, 92, 0.5);
      border-radius: 50%;
      flex-shrink: 0;
    }

    .student-info {
      flex: 1;
      min-width: 0;
    }

    .student-name {
      font-size: 14px;
      color: var(--text-primary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .student-meta {
      font-size: 11px;
      color: var(--text-secondary);
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 2px;
    }

    .role-tag {
      padding: 1px 6px;
      border-radius: 4px;
      font-size: 10px;
      font-weight: 500;
    }

    .role-tag.leader {
      background: rgba(0, 212, 255, 0.2);
      color: var(--accent-cyan);
    }

    .role-tag.member {
      background: rgba(139, 157, 195, 0.15);
      color: var(--text-secondary);
    }

    .student-score-mini {
      font-size: 12px;
      font-weight: 700;
      color: var(--success);
      font-variant-numeric: tabular-nums;
    }

    .student-score-mini.warning { color: var(--warning); }
    .student-score-mini.danger { color: var(--danger); }

    /* ===== 主内容区 ===== */
    .content-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: var(--bg-primary);
    }

    /* ===== Tab 切换栏 ===== */
    .tab-bar {
      display: flex;
      gap: 0;
      padding: 12px 20px 0;
      border-bottom: 1px solid var(--border-color);
      background: var(--bg-primary);
    }

    .tab-btn {
      padding: 10px 24px;
      border: none;
      background: transparent;
      color: var(--text-secondary);
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      border-bottom: 2px solid transparent;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .tab-btn:hover {
      color: var(--text-primary);
    }

    .tab-btn.active {
      color: var(--accent-cyan);
      border-bottom-color: var(--accent-cyan);
    }

    /* ===== Tab 内容面板 ===== */
    .tab-panels {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
    }

    .tab-panel {
      display: none;
    }

    .tab-panel.active {
      display: block;
    }

    /* ===== 卡片通用样式 ===== */
    .card {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-card);
      padding: 20px;
      margin-bottom: 16px;
      transition: box-shadow 0.3s ease;
    }

    .card:hover {
      box-shadow: var(--shadow-glow);
    }

    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid rgba(26, 58, 92, 0.5);
    }

    .card-title {
      font-size: 16px;
      font-weight: 600;
      color: var(--text-primary);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .card-title i {
      color: var(--accent-cyan);
      font-size: 18px;
    }

    .card-subtitle {
      font-size: 12px;
      color: var(--text-secondary);
      margin-top: 4px;
    }

    .card-badge {
      padding: 4px 10px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 600;
    }

    .badge-success { background: rgba(0, 230, 118, 0.15); color: var(--success); }
    .badge-warning { background: rgba(255, 196, 0, 0.15); color: var(--warning); }
    .badge-danger { background: rgba(255, 82, 82, 0.15); color: var(--danger); }
    .badge-info { background: rgba(0, 212, 255, 0.15); color: var(--accent-cyan); }

    /* ===== 评价面板布局 ===== */
    .eval-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .eval-grid .card:last-child:nth-child(odd) {
      grid-column: 1 / -1;
    }

    @media (max-width: 1200px) {
      .eval-grid { grid-template-columns: 1fr; }
    }

    /* ===== 表单元素 ===== */
    .form-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 0;
      border-bottom: 1px solid rgba(26, 58, 92, 0.3);
    }

    .form-row:last-child { border-bottom: none; }

    .form-label {
      font-size: 13px;
      color: var(--text-secondary);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .form-label .max-mark {
      font-size: 11px;
      color: var(--text-secondary);
      opacity: 0.7;
    }

    .form-input {
      width: 80px;
      padding: 6px 10px;
      background: rgba(10, 22, 40, 0.8);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-btn);
      color: var(--text-primary);
      font-size: 13px;
      text-align: center;
      transition: all 0.3s ease;
      font-variant-numeric: tabular-nums;
    }

    .form-input:focus {
      outline: none;
      border-color: var(--accent-cyan);
      box-shadow: 0 0 8px rgba(0, 212, 255, 0.2);
    }

    .form-input:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .form-input.is-warning {
      border-color: var(--warning);
      box-shadow: 0 0 8px rgba(255, 196, 0, 0.2);
    }

    .form-input.is-danger {
      border-color: var(--danger);
      box-shadow: 0 0 8px rgba(255, 82, 82, 0.2);
    }

    .form-value {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-primary);
      font-variant-numeric: tabular-nums;
    }

    .form-value.score { color: var(--success); }
    .form-value.warning { color: var(--warning); }
    .form-value.danger { color: var(--danger); }

    /* ===== 开关样式 ===== */
    .toggle-switch {
      position: relative;
      width: 44px;
      height: 24px;
      background: var(--border-color);
      border-radius: 12px;
      cursor: pointer;
      transition: background 0.3s ease;
      flex-shrink: 0;
    }

    .toggle-switch.on {
      background: var(--danger);
    }

    .toggle-switch::after {
      content: '';
      position: absolute;
      top: 2px;
      left: 2px;
      width: 20px;
      height: 20px;
      background: white;
      border-radius: 50%;
      transition: transform 0.3s ease;
    }

    .toggle-switch.on::after {
      transform: translateX(20px);
    }

    /* ===== 按钮样式 ===== */
    .btn {
      padding: 8px 16px;
      border: 1px solid var(--border-color);
      background: rgba(26, 58, 92, 0.4);
      color: var(--text-primary);
      border-radius: var(--radius-btn);
      cursor: pointer;
      font-size: 13px;
      transition: all 0.3s ease;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .btn:hover {
      border-color: var(--accent-cyan);
      background: rgba(0, 212, 255, 0.1);
    }

    .btn-primary {
      background: var(--accent-cyan);
      color: #0a1628;
      border-color: var(--accent-cyan);
      font-weight: 600;
    }

    .btn-primary:hover {
      background: #33ddff;
      box-shadow: 0 0 12px rgba(0, 212, 255, 0.4);
    }

    .btn-sm {
      padding: 4px 10px;
      font-size: 12px;
    }

    .btn-danger {
      border-color: var(--danger);
      color: var(--danger);
    }

    .btn-danger:hover {
      background: rgba(255, 82, 82, 0.15);
    }

    .btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    /* ===== AI 操作按钮特殊样式 ===== */
    .btn-ai {
      background: linear-gradient(135deg, rgba(0, 212, 255, 0.15), rgba(0, 230, 118, 0.1));
      border-color: var(--accent-cyan);
      color: var(--accent-cyan);
      position: relative;
      overflow: hidden;
    }

    .btn-ai::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: linear-gradient(
        45deg,
        transparent 30%,
        rgba(0, 212, 255, 0.1) 50%,
        transparent 70%
      );
      animation: ai-shimmer 3s infinite;
    }

    @keyframes ai-shimmer {
      0% { transform: translateX(-100%) rotate(45deg); }
      100% { transform: translateX(100%) rotate(45deg); }
    }

    .btn-ai:hover {
      box-shadow: 0 0 15px rgba(0, 212, 255, 0.3);
    }

    .btn-ai i {
      animation: ai-pulse 2s infinite;
    }

    @keyframes ai-pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    /* ===== 小计行 ===== */
    .subtotal-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 0;
      margin-top: 8px;
      border-top: 2px solid var(--border-color);
      font-weight: 600;
      font-size: 14px;
    }

    .subtotal-label { color: var(--text-primary); }
    .subtotal-value { color: var(--accent-cyan); font-size: 18px; }

    /* ===== 总分展示区 ===== */
    .total-score-display {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 30px;
      padding: 24px;
      background: linear-gradient(135deg, rgba(0, 212, 255, 0.05), rgba(0, 230, 118, 0.05));
      border-radius: var(--radius-card);
      border: 1px solid var(--border-color);
      margin-bottom: 20px;
    }

    .score-circle {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      border: 3px solid var(--accent-cyan);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      box-shadow: 0 0 20px rgba(0, 212, 255, 0.2);
    }

    .score-circle .score-num {
      font-size: 28px;
      font-weight: 700;
      color: var(--accent-cyan);
      line-height: 1;
    }

    .score-circle .score-label {
      font-size: 11px;
      color: var(--text-secondary);
      margin-top: 4px;
    }

    .score-breakdown {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .break-item {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 13px;
    }

    .break-label { color: var(--text-secondary); width: 80px; }
    .break-value {
      font-weight: 600;
      color: var(--text-primary);
      font-variant-numeric: tabular-nums;
    }

    /* ===== 数据大屏布局 ===== */
    .dashboard-container {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      grid-template-rows: auto auto;
      gap: 16px;
    }

    .dashboard-top {
      grid-column: 1 / -1;
      display: grid;
      grid-template-columns: 2fr 1fr 1fr;
      gap: 16px;
    }

    .dashboard-left { grid-column: 1; }
    .dashboard-center { grid-column: 2; }
    .dashboard-right { grid-column: 3; }

    .dashboard-row2 {
      grid-column: 1 / -1;
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 16px;
    }

    .chart-card {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-card);
      padding: 16px;
      min-height: 280px;
      display: flex;
      flex-direction: column;
    }

    .chart-card .chart-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .chart-card .chart-title i {
      color: var(--accent-cyan);
    }

    .chart-container {
      flex: 1;
      min-height: 220px;
    }

    /* ===== 事件流样式 ===== */
    .event-stream {
      max-height: 280px;
      overflow-y: auto;
    }

    .event-item {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 10px 0;
      border-bottom: 1px solid rgba(26, 58, 92, 0.3);
      animation: event-slide-in 0.5s ease;
    }

    @keyframes event-slide-in {
      from { opacity: 0; transform: translateX(-20px); }
      to { opacity: 1; transform: translateX(0); }
    }

    .event-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      margin-top: 5px;
      flex-shrink: 0;
    }

    .event-dot.success { background: var(--success); box-shadow: 0 0 6px var(--success); }
    .event-dot.warning { background: var(--warning); box-shadow: 0 0 6px var(--warning); }
    .event-dot.danger { background: var(--danger); box-shadow: 0 0 6px var(--danger); }
    .event-dot.info { background: var(--accent-cyan); box-shadow: 0 0 6px var(--accent-cyan); }

    .event-content {
      flex: 1;
    }

    .event-text {
      font-size: 12px;
      color: var(--text-primary);
      line-height: 1.4;
    }

    .event-time {
      font-size: 11px;
      color: var(--text-secondary);
      margin-top: 2px;
    }

    /* ===== 底部状态栏 ===== */
    .status-bar {
      height: 36px;
      background: var(--bg-secondary);
      border-top: 1px solid var(--border-color);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      font-size: 12px;
      color: var(--text-secondary);
    }

    .status-left, .status-right {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .ai-status {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--success);
      animation: status-blink 2s infinite;
    }

    @keyframes status-blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    /* ===== 模态框 ===== */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(10, 22, 40, 0.85);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      opacity: 0;
      visibility: hidden;
      transition: all 0.3s ease;
    }

    .modal-overlay.show {
      opacity: 1;
      visibility: visible;
    }

    .modal-content {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-card);
      padding: 24px;
      max-width: 600px;
      width: 90%;
      max-height: 80vh;
      overflow-y: auto;
      box-shadow: var(--shadow-glow);
      transform: scale(0.9);
      transition: transform 0.3s ease;
    }

    .modal-overlay.show .modal-content {
      transform: scale(1);
    }

    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    .modal-title {
      font-size: 18px;
      font-weight: 600;
      color: var(--text-primary);
    }

    .modal-close {
      width: 32px;
      height: 32px;
      border: none;
      background: rgba(26, 58, 92, 0.5);
      color: var(--text-secondary);
      border-radius: 50%;
      cursor: pointer;
      font-size: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
    }

    .modal-close:hover {
      background: var(--danger);
      color: white;
    }

    /* ===== 复选框组 ===== */
    .checkbox-group {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .checkbox-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px;
      border-radius: var(--radius-btn);
      transition: background 0.2s ease;
    }

    .checkbox-item:hover {
      background: rgba(0, 212, 255, 0.05);
    }

    .custom-checkbox {
      width: 18px;
      height: 18px;
      border: 2px solid var(--border-color);
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s ease;
      flex-shrink: 0;
    }

    .custom-checkbox.checked {
      background: var(--accent-cyan);

    /* ===== 互评展示 ===== */

  <!-- ============================================================

  <script>
    // ============================================================
    // 第一部分：数据模型与常量定义
    // ============================================================

    /** 当前用户角色：teacher | student | enterprise */
    let currentRole = 'teacher';
    /** 当前登录学生ID（角色为学生时有效） */
    let currentStudentId = null;

    let selectedStudentId = 's1';
    /** 当前激活的Tab */

    /** 评价数据（从localStorage加载或默认数据） */
    let evalData = null;
    /** ECharts 实例缓存 */
    const chartInstances = {};

    // ===== 模拟初始数据 =====
    const DEMO_STUDENTS = [
      { id: 's1', name: '张明', groupId: 'g1', groupName: '雄鹰组', role: '组长', avatar: '👨‍✈️' },

              presentationScore: 26, peerScores: { s1: 4.2, s3: 4.0 },

              aiTracking: { loginDays: 10, studyHours: 38, completion: 78 } },
        s3: { wikiScore: 20, wikiKeywords: ['RTK', '空投精度'], wikiLink: '',
              presentationScore: 24, peerScores: { s1: 3.8, s2: 4.0 },

        s4: { wikiScore: 27, wikiKeywords: ['禁飞区', '特情处置', '数字孪生'], wikiLink: 'https://wiki.example.com/s4',
              presentationScore: 29, peerScores: { s5: 4.8, s6: 4.6 },

              aiTracking: { loginDays: 14, studyHours: 52, completion: 96 } },
        s5: { wikiScore: 23, wikiKeywords: ['空域申请', '风险评估'], wikiLink: 'https://wiki.example.com/s5',
              presentationScore: 25, peerScores: { s4: 4.0, s6: 4.2 },
              selfContribution: 18,
              aiTracking: { loginDays: 11, studyHours: 40, completion: 82 } },
        s6: { wikiScore: 21, wikiKeywords: ['应急物流'], wikiLink: '',
              presentationScore: 23, peerScores: { s4: 3.9, s5: 4.1 },
              selfContribution: 19,
              aiTracking: { loginDays: 9, studyHours: 33, completion: 70 } }
      },
      // 结果性评价（满分100，权重60%）
      result: {
        s1: { planDoc: 13, packagePlan: 4.5, dispatchPlan: 8,
              simulation: 13, realFlight: 22, multiDrone: 9,
              defensePPT: 8.5, teamShow: 4.5, ideology: 4.5,
              enterpriseOp: { simulation: 12, realFlight: 21, multiDrone: 8.5 } },
        s2: { planDoc: 12, packagePlan: 4.0, dispatchPlan: 7,
              simulation: 12, realFlight: 20, multiDrone: 8,
              defensePPT: 8.0, teamShow: 4.0, ideology: 4.0,
              enterpriseOp: { simulation: 11, realFlight: 19, multiDrone: 8 } },
        s3: { planDoc: 11, packagePlan: 3.5, dispatchPlan: 6.5,
              simulation: 11, realFlight: 18, multiDrone: 7,
              defensePPT: 7.5, teamShow: 3.5, ideology: 3.5,
              enterpriseOp: { simulation: 10, realFlight: 17, multiDrone: 7 } },
        s4: { planDoc: 14, packagePlan: 4.8, dispatchPlan: 9,
              simulation: 14, realFlight: 24, multiDrone: 9.5,
              defensePPT: 9.0, teamShow: 4.8, ideology: 4.8,
              enterpriseOp: { simulation: 13, realFlight: 23, multiDrone: 9 } },
        s5: { planDoc: 12, packagePlan: 4.2, dispatchPlan: 7.5,
              simulation: 12, realFlight: 21, multiDrone: 8.5,
              defensePPT: 8.2, teamShow: 4.2, ideology: 4.2,
              enterpriseOp: { simulation: 11, realFlight: 20, multiDrone: 8 } },
        s6: { planDoc: 11, packagePlan: 3.8, dispatchPlan: 7,
              simulation: 11, realFlight: 19, multiDrone: 7.5,
              defensePPT: 7.8, teamShow: 3.8, ideology: 3.8,
              enterpriseOp: { simulation: 10, realFlight: 18, multiDrone: 7.5 } }
      },
      // 发展性评价附加分
      development: {
        g1: { realUser: 3, techBreakthrough: 2, management: 1 },
        g2: { realUser: 2, techBreakthrough: 1, management: 2 }
      },
      // 安全否决
      safetyVeto: { s1: false, s2: false, s3: false, s4: false, s5: false, s6: false },
      // WIKI日志提交
      wikiLogs: [
        { studentId: 's1', week: 1, link: 'https://wiki.example.com/s1/w1', keywords: ['应急物流', 'SORA'], submitTime: '2026-05-20' },
        { studentId: 's4', week: 1, link: 'https://wiki.example.com/s4/w1', keywords: ['禁飞区', '特情处置'], submitTime: '2026-05-20' }
      ]
    };

    /** 关键词词库（AI检查用） */
    const KEYWORD_DATABASE = ['应急物流', 'SORA', '配平', '集群控制', '航线规划', 'RTK', '空投精度', '禁飞区', '特情处置', '数字孪生', '空域申请', '风险评估'];

    /** 组内自评总分池限制 */
    const CONTRIBUTION_POOL = { 3: 42, 4: 56 };

    // ===== 预警事件数据 =====
    const WARNING_EVENTS = [
      { type: 'warning', text: '王浩(s3) 近7天未提交WIKI日志', time: '10分钟前' },
      { type: 'danger', text: '王浩(s3) AI过程追踪完成度低于70%', time: '15分钟前' },
      { type: 'success', text: '陈雪(s4) 真机飞行获得企业专家满分', time: '30分钟前' },
      { type: 'info', text: '雄鹰组 组内自评贡献分总分池校验通过', time: '1小时前' },
      { type: 'warning', text: '赵琳(s6) 虚拟仿真得分低于组均', time: '2小时前' },
      { type: 'success', text: '张明(s1) WIKI关键词覆盖率100%', time: '3小时前' },
      { type: 'info', text: '系统自动备份评价数据完成', time: '4小时前' }
    ];

    // ============================================================
    // 第二部分：数据持久化工具函数
    // ============================================================

    /**
     * 保存评价数据到 localStorage
     */
    function saveData() {
      try {
        localStorage.setItem('evaluation_data', JSON.stringify(evalData));
        document.getElementById('last-update').textContent = new Date().toLocaleString('zh-CN');
      } catch (e) {
        console.error('保存数据失败:', e);
        showToast('保存失败，请检查浏览器存储权限', 'error');
      }
    }

    /**
     * 从 localStorage 加载评价数据
     * 有则加载，无则使用默认模拟数据
     */
    function loadData() {
      try {
        const stored = localStorage.getItem('evaluation_data');
        if (stored) {
          evalData = JSON.parse(stored);
          // 合并可能的新字段
          if (!evalData.wikiLogs) evalData.wikiLogs = DEFAULT_EVAL_DATA.wikiLogs;
          if (!evalData.safetyVeto) evalData.safetyVeto = DEFAULT_EVAL_DATA.safetyVeto;
        } else {
          evalData = JSON.parse(JSON.stringify(DEFAULT_EVAL_DATA));
          saveData();
        }
      } catch (e) {
        console.error('加载数据失败:', e);
        evalData = JSON.parse(JSON.stringify(DEFAULT_EVAL_DATA));
      }
    }

    /**
     * 重置为默认数据（调试用）
     */
    function resetData() {
      if (confirm('确定要重置所有评价数据为初始状态吗？')) {
        evalData = JSON.parse(JSON.stringify(DEFAULT_EVAL_DATA));
        saveData();
        renderSidebar();
        renderEvalPanel();
        showToast('数据已重置', 'success');
      }
    }

    // ============================================================
    // 第三部分：核心评分计算函数
    // ============================================================

    /**
     * 计算过程性评价得分（满分100）
     * @param {string} studentId - 学生ID
     * @returns {number} 过程性评价得分（0-100）
     */
    function calcProcessScore(studentId) {
      const p = evalData.process[studentId];
      if (!p) return 0;

      // WIKI评分（0-30分）
      const wikiScore = Math.min(30, p.wikiScore || 0);
      // 课堂展示（0-30分）= 教师评分 + 同辈互评平均分
      const peerAvg = calcPeerAverage(studentId);
      const presentationScore = Math.min(30, (p.presentationScore || 0) + peerAvg);
      // 组内自评贡献分（0-30分）
      const contributionScore = Math.min(30, p.selfContribution || 0);
      // AI过程追踪（0-10分）基于完成度
      const completion = p.aiTracking?.completion || 0;
      const aiScore = Math.min(10, Math.round(completion / 10));

      return Math.round((wikiScore + presentationScore + contributionScore + aiScore) * 10) / 10;
    }

    /**
     * 计算同辈互评平均分
     * @param {string} studentId - 学生ID
     * @returns {number} 同辈互评平均分
     */
    function calcPeerAverage(studentId) {
      const p = evalData.process[studentId];
      if (!p || !p.peerScores) return 0;
      const scores = Object.values(p.peerScores);
      if (scores.length === 0) return 0;
      const avg = scores.reduce((a, b) => a + b, 0) / scores.length;
      return Math.round(avg * 10) / 10;
    }

    /**
     * 计算结果性评价得分（满分100）
     * @param {string} studentId - 学生ID
     * @returns {number} 结果性评价得分（0-100）
     */
    function calcResultScore(studentId) {
      const r = evalData.result[studentId];
      if (!r) return 0;

      // 方案成果（30分）
      const planScore = Math.min(30,
        (r.planDoc || 0) + (r.packagePlan || 0) + (r.dispatchPlan || 0)
      );
      // 实操验收（50分）- 取教师和企业专家平均分
      const sim = r.simulation || 0;
      const real = r.realFlight || 0;
      const multi = r.multiDrone || 0;
      const entSim = r.enterpriseOp?.simulation || sim;
      const entReal = r.enterpriseOp?.realFlight || real;
      const entMulti = r.enterpriseOp?.multiDrone || multi;

      const avgSim = Math.round(((sim + entSim) / 2) * 10) / 10;
      const avgReal = Math.round(((real + entReal) / 2) * 10) / 10;
      const avgMulti = Math.round(((multi + entMulti) / 2) * 10) / 10;

      const practiceScore = Math.min(50, avgSim + avgReal + avgMulti);
      // 答辩展示（20分）
      const defenseScore = Math.min(20,
        (r.defensePPT || 0) + (r.teamShow || 0) + (r.ideology || 0)
      );

      return Math.round((planScore + practiceScore + defenseScore) * 10) / 10;
    }

    /**
     * 计算总评成绩
     * 总评 = 过程分 × 0.4 + 结果分 × 0.6 + 附加分
     * 安全否决 → 上限59分
     * @param {string} studentId - 学生ID
     * @returns {Object} 包含总分和各部分得分的对象
     */
    function calcTotalScore(studentId) {
      const processScore = calcProcessScore(studentId);
      const resultScore = calcResultScore(studentId);
      const student = DEMO_STUDENTS.find(s => s.id === studentId);
      const devData = student ? evalData.development[student.groupId] : null;
      const devBonus = devData ? (devData.realUser || 0) + (devData.techBreakthrough || 0) + (devData.management || 0) : 0;
      const clampedBonus = Math.min(10, devBonus);

      let total = Math.round((processScore * 0.4 + resultScore * 0.6 + clampedBonus) * 10) / 10;

      // 安全否决检查
      const isVetoed = evalData.safetyVeto[studentId];
      if (isVetoed) {
        total = Math.min(total, 59);
      }

      return {
        processScore,
        resultScore,
        devBonus: clampedBonus,
        total,
        isVetoed
      };
    }

    /**
     * 计算小组已用贡献分总和
     * @param {string} groupId - 小组ID
     * @returns {number} 已用贡献分总和
     */
    function calcGroupContributionUsed(groupId) {
      const groupMembers = DEMO_STUDENTS.filter(s => s.groupId === groupId);
      let used = 0;
      groupMembers.forEach(m => {
        const p = evalData.process[m.id];
        if (p && p.selfContribution !== undefined) {
          used += parseFloat(p.selfContribution) || 0;
        }
      });
      return used;
    }

    /**
     * 获取小组贡献分池上限
     * @param {string} groupId - 小组ID
     * @returns {number} 贡献分池上限
     */
    function getContributionPoolLimit(groupId) {
      const groupSize = DEMO_STUDENTS.filter(s => s.groupId === groupId).length;
      return CONTRIBUTION_POOL[groupSize] || 42;
    }

    /**
     * 渲染侧边栏 - 按小组分组显示学生列表
     */
    function renderSidebar() {
      const container = document.getElementById('sidebar-content');
      const students = getVisibleStudents();

      // 按小组分组
      const groups = {};
      students.forEach(s => {
        if (!groups[s.groupId]) groups[s.groupId] = [];
        groups[s.groupId].push(s);
      });

      let html = '';
      for (const [groupId, members] of Object.entries(groups)) {
        const groupName = members[0].groupName;
        const poolLimit = getContributionPoolLimit(groupId);
        const poolUsed = calcGroupContributionUsed(groupId);
        const poolWarning = poolUsed > poolLimit;

        html += `
          <div class="group-section">
            <div class="group-title">
              <i class="fas fa-layer-group"></i>
              ${groupName}
              <span style="margin-left:auto;font-size:11px;color:${poolWarning ? 'var(--danger)' : 'var(--text-secondary)'};">
                贡献池: ${poolUsed}/${poolLimit}
              </span>
            </div>
        `;

        members.forEach(student => {
          const scores = calcTotalScore(student.id);
          const isActive = student.id === selectedStudentId;
          const scoreClass = scores.isVetoed ? 'danger' : (scores.total >= 80 ? '' : (scores.total >= 60 ? 'warning' : 'danger'));

          html += `
            <div class="student-item ${isActive ? 'active' : ''}"
                 onclick="selectStudent('${student.id}')"
                 data-student="${student.id}">
              <div class="student-avatar">${student.avatar}</div>
              <div class="student-info">
                <div class="student-name">${student.name}</div>
                <div class="student-meta">
                  <span class="role-tag ${student.role === '组长' ? 'leader' : 'member'}">${student.role}</span>
                  ${scores.isVetoed ? '<span style="color:var(--danger);"><i class="fas fa-exclamation-triangle"></i> 否决</span>' : ''}
                </div>
              </div>
              <div class="student-score-mini ${scoreClass}">${scores.total}</div>
            </div>
          `;
        });

        html += '</div>';
      }

      container.innerHTML = html;
    }

     */
    function getVisibleStudents() {
      if (currentRole === 'teacher' || currentRole === 'enterprise') {
        return DEMO_STUDENTS;
      } else if (currentRole === 'student') {
        // 学生只能看本组 - 模拟：s1为当前登录学生
        const me = currentStudentId || 's1';
        const myGroup = DEMO_STUDENTS.find(s => s.id === me)?.groupId;
        return DEMO_STUDENTS.filter(s => s.groupId === myGroup);
      }
      return DEMO_STUDENTS;
    }

        groupAvg[0] += p ? (p.wikiScore / 30) * 100 : 0;

    /**
     * 切换角色
     * @param {string} role - 角色: teacher | student | enterprise
     */
    function switchRole(role) {
      currentRole = role;

      // 更新角色按钮状态
      document.querySelectorAll('.role-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.role === role);
      });

      // 学生角色模拟：设定当前登录学生为s1
      if (role === 'student') {
        currentStudentId = 's1';
        // 学生只能看本组，默认选中自己
        const me = DEMO_STUDENTS.find(s => s.id === currentStudentId);
        if (me) selectedStudentId = currentStudentId;
      } else {
        currentStudentId = null;
      }

      // 企业专家默认选中第一个
      if (role === 'enterprise' && !selectedStudentId) {
        selectedStudentId = 's1';
      }

      renderSidebar();
      renderEvalPanel();

      // 如果在大屏tab，刷新大屏
      if (currentTab === 'dashboard') {
        renderDashboard();
      }
    }

    /**
     * 切换 Tab
     * @param {string} tab - tab名称: eval | dashboard
     */
    function switchTab(tab) {
      currentTab = tab;

      // 更新 Tab 按钮状态
      document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.tab === tab);
      });

      // 显示/隐藏面板
      document.querySelectorAll('.tab-panel').forEach(panel => {
        panel.classList.remove('active');
      });
      document.getElementById(`panel-${tab}`).classList.add('active');

      // 渲染对应内容
      if (tab === 'eval') {
        renderEvalPanel();
      } else if (tab === 'dashboard') {
        renderDashboard();
      }
    }

    /**
     * 更新评分字段
     * @param {string} section - 评价类别: process | result
     * @param {string} studentId - 学生ID
     * @param {string} field - 字段名
     * @param {string} value - 新值
     */
    function updateScore(section, studentId, field, value) {
      const numVal = parseFloat(value);
      if (isNaN(numVal)) return;

      if (!evalData[section][studentId]) {
        evalData[section][studentId] = {};
      }
      evalData[section][studentId][field] = numVal;
      saveData();
      renderEvalPanel();
      renderSidebar();
      showToast('评分已更新', 'success');
    }

     * @param {string} field - 字段名
     * @param {string} value - 新值
     */
    function updateEnterpriseScore(studentId, field, value) {
      const numVal = parseFloat(value);
      if (isNaN(numVal)) return;

      if (!evalData.result[studentId]) {
        evalData.result[studentId] = {};
      }
      if (!evalData.result[studentId].enterpriseOp) {

      }

      saveData();
      renderEvalPanel();
      showToast('企业专家评分已更新', 'success');
    }

    /**
     * 更新贡献分（带总分池校验）
     * @param {string} studentId - 学生ID
     * @param {string} groupId - 小组ID
     * @param {string} value - 新值
     */
    function updateContribution(studentId, groupId, value) {
      const numVal = parseFloat(value) || 0;
      const poolLimit = getContributionPoolLimit(groupId);

      // 计算排除当前学生后的已用分数
      const groupMembers = DEMO_STUDENTS.filter(s => s.groupId === groupId);
      let othersUsed = 0;
      groupMembers.forEach(m => {
        if (m.id !== studentId) {
          const p = evalData.process[m.id];
          othersUsed += p?.selfContribution || 0;
        }
      });

      const wouldUse = othersUsed + numVal;
      const inputEl = document.getElementById(`contrib-input-${studentId}`);
      const hintEl = document.getElementById(`contrib-hint-${studentId}`);

      if (wouldUse > poolLimit) {
        // 超出限制，标红提示
        if (inputEl) inputEl.classList.add('is-danger');
        if (hintEl) {
          hintEl.className = 'hint-text danger';
          hintEl.innerHTML = `<i class="fas fa-exclamation-circle"></i> 超出总分池限制！当前将使用 ${wouldUse}/${poolLimit}分，请调整`;
        }
        showToast('超出组内贡献分总分池限制！', 'error');
        return; // 不保存
      } else {
        if (inputEl) inputEl.classList.remove('is-danger');
        if (hintEl) {
          hintEl.className = 'hint-text';
          hintEl.innerHTML = `<i class="fas fa-info-circle"></i> 小组总分池上限: ${poolLimit}分，已用: ${wouldUse}分`;
        }
      }

      // 保存
      if (!evalData.process[studentId]) evalData.process[studentId] = {};
      evalData.process[studentId].selfContribution = numVal;
      saveData();
      renderSidebar();
      showToast('贡献分已更新', 'success');
    }

    /**
     * 更新发展性评分
     * @param {string} groupId - 小组ID
     * @param {string} field - 字段名

// ==================== 1. 工具函数 ====================

/**
 * 生成指定范围内的随机整数
 * @param {number} min - 最小值（包含）
 * @param {number} max - 最大值（包含）
 * @returns {number} 随机整数
 */
function random(min, max) {
  return Math.floor(Math.random() * (max - min + 1)) + min;
}

/**
 * 生成指定范围内的随机浮点数
 * @param {number} min - 最小值（包含）
 * @param {number} max - 最大值（包含）
 * @param {number} decimals - 小数位数，默认1位
 * @returns {number} 随机浮点数
 */
function randomFloat(min, max, decimals = 1) {
  const val = Math.random() * (max - min) + min;
  return Number(val.toFixed(decimals));
}

/**
 * 格式化日期为 yyyy-MM-dd 字符串
 * @param {Date} date - 日期对象，默认当前日期
 * @returns {string} 格式化后的日期字符串
 */
function formatDate(date = new Date()) {
  const y = date.getFullYear();
  const m = String(date.getMonth() + 1).padStart(2, '0');
  const d = String(date.getDate()).padStart(2, '0');
  return `${y}-${m}-${d}`;
}

/**
 * 深拷贝对象（通过 JSON 序列化/反序列化）
 * @param {Object} obj - 待拷贝的对象
 * @returns {Object} 深拷贝后的新对象
 */
function deepClone(obj) {
  return JSON.parse(JSON.stringify(obj));
}

/**
 * 防抖函数
 * @param {Function} fn - 需要防抖的函数
 * @param {number} delay - 延迟时间（毫秒）
 * @returns {Function} 防抖后的函数
 */
function debounce(fn, delay) {
  let timer = null;
  return function (...args) {
    if (timer) clearTimeout(timer);
    timer = setTimeout(() => fn.apply(this, args), delay);
  };
}

/**
 * 从数组中随机选取指定数量的不重复元素
 * @param {Array} arr - 源数组
 * @param {number} count - 选取数量
 * @returns {Array} 随机选取的元素数组
 */
function randomPick(arr, count) {
  if (count >= arr.length) return [...arr];
  const shuffled = [...arr].sort(() => Math.random() - 0.5);
  return shuffled.slice(0, count);
}

/**
 * 生成最近 N 天内的随机日期字符串
 * @param {number} days - 最近天数范围
 * @returns {string} 随机日期字符串 yyyy-MM-dd
 */
function randomRecentDate(days = 30) {
  const d = new Date();
  d.setDate(d.getDate() - random(0, days));
  return formatDate(d);
}

/**
 * 生成最近几分钟内的随机时间戳
 * @param {number} minutes - 最近分钟数
 * @returns {string} 时间字符串 HH:mm:ss
 */
function randomRecentTime(minutes = 10) {
  const d = new Date();
  d.setMinutes(d.getMinutes() - random(0, minutes));
  d.setSeconds(random(0, 59));
  const h = String(d.getHours()).padStart(2, '0');
  const m = String(d.getMinutes()).padStart(2, '0');
  const s = String(d.getSeconds()).padStart(2, '0');
  return `${h}:${m}:${s}`;
}

/**
 * AI 关键词检查 - 分析学生评价数据中的关键词匹配情况
 * 将学生提交的 wikiKeywords 与专业关键词数据库对比，给出匹配结果和改进建议
 * @param {string} studentId - 学生ID
 * @param {Object} evalData - 评价数据对象，包含所有学生的评价信息
 * @returns {Object} 关键词检查结果 { matched, missing, score, suggestion }
 */
function aiCheckKeywordsCore(studentId, evalData) {
  // 获取该学生的评价数据
  const studentData = evalData[studentId];
  if (!studentData) {
    return { matched: [], missing: KEYWORD_DATABASE.slice(0, 4), score: 10, suggestion: '未找到学生数据，建议补充核心关键词' };
  }

  // 获取学生提交的关键词数组
  const studentKeywords = studentData.wikiKeywords || [];

  // 如果学生没有提交关键词，返回推荐列表
  if (studentKeywords.length === 0) {
    const recommended = randomPick(KEYWORD_DATABASE, 4);
    return {
      matched: [],
      missing: recommended,
      score: 10,
      suggestion: `建议补充"${recommended.join('"、"')}"相关内容`
    };
  }

  // 将学生关键词转为小写进行不区分大小写匹配
  const studentKwLower = studentKeywords.map(k => k.toLowerCase());
  const dbLower = KEYWORD_DATABASE.map(k => k.toLowerCase());

  // 计算已匹配和缺失的关键词
  const matched = [];
  const missing = [];

  studentKeywords.forEach((kw, idx) => {
    if (dbLower.includes(studentKwLower[idx])) {
      matched.push(kw);
    }
  });

  KEYWORD_DATABASE.forEach((kw, idx) => {
    if (!studentKwLower.includes(dbLower[idx])) {
      missing.push(kw);
    }
  });

  // 随机模拟：如果学生关键词较多，随机保留部分匹配结果（模拟AI不确定性）
  let finalMatched = matched;
  if (matched.length > 5) {
    finalMatched = randomPick(matched, random(3, 5));
  }

  // 从缺失中随机选取2-4个作为推荐补充
  const finalMissing = missing.length > 0 ? randomPick(missing, Math.min(random(2, 4), missing.length)) : [];

  // 计算建议分数：基础分10分 + 每个匹配词2分，上限30分
  const score = Math.min(10 + finalMatched.length * 2, 30);

  // 生成建议文本
  let suggestion = '';
  if (finalMissing.length > 0) {
    suggestion = `建议补充"${finalMissing.join('"和"')}"相关内容`;
  } else if (finalMatched.length > 0) {
    suggestion = '关键词覆盖良好，继续保持';
  } else {
    suggestion = '建议补充低空应急领域专业术语';
  }

  return {
    matched: finalMatched,
    missing: finalMissing,
    score,
    suggestion
  };
}

// ==================== 4. AI 演讲分析 ====================

/**
 * AI 演讲分析 - 模拟生成六维雷达图数据
 * 从逻辑、专业、表达、自信、互动、时间控制六个维度评估学生演讲表现
 * @param {string} studentId - 学生ID
 * @returns {Object} 演讲分析结果 { dimensions, scores, overall, comment }
 */
function aiSpeechAnalysisCore(studentId) {
  // 六维评估维度定义
  const dimensions = ['逻辑', '专业', '表达', '自信', '互动', '时间控制'];

  // 基于 studentId 生成稳定的伪随机种子（保证同一学生多次调用结果相近）
  let seed = 0;
  for (let i = 0; i < studentId.length; i++) {
    seed += studentId.charCodeAt(i);
  }

  // 生成6个维度的分数（65-98范围），带一定相关性（优秀学生各维度都偏高）
  const baseLevel = random(70, 95); // 基础水平
  const scores = dimensions.map((_, idx) => {
    // 在基础水平上下浮动，模拟各维度差异
    const variance = random(-10, 10);
    let score = baseLevel + variance;
    // 确保每个维度在合理范围内
    score = Math.max(65, Math.min(98, score));
    // 个别维度可能有明显高低
    if (idx === 4) score -= random(0, 8); // 互动普遍稍低
    if (idx === 5) score -= random(0, 5); // 时间控制容易扣分
    return Math.max(60, Math.min(98, score));
  });

  // 计算总分（加权平均，逻辑和专业权重稍高）
  const weights = [0.2, 0.2, 0.2, 0.15, 0.15, 0.1];
  const overall = Math.round(
    scores.reduce((sum, s, i) => sum + s * weights[i], 0)
  );

  // 根据总分选择评语
  let commentPool;
  if (overall >= 90) {
    commentPool = SPEECH_COMMENTS.excellent;
  } else if (overall >= 80) {
    commentPool = SPEECH_COMMENTS.good;
  } else if (overall >= 70) {
    commentPool = SPEECH_COMMENTS.average;
  } else if (overall >= 60) {
    commentPool = SPEECH_COMMENTS.poor;
  } else {
    commentPool = SPEECH_COMMENTS.bad;
  }

  // 额外生成一条具体建议
  const minIdx = scores.indexOf(Math.min(...scores));
  const dimensionSuggestions = [
    '建议优化演讲结构，增强论证层次',
    '可补充更多行业前沿技术细节',
    '注意语速控制和吐字清晰度',
    '适当增加眼神交流和肢体语言',
    '多设计听众提问和互动环节',
    '严格控制各环节时间分配'
  ];

  const comment = commentPool[random(0, commentPool.length - 1)] + '，' + dimensionSuggestions[minIdx];

  return {
    dimensions,
    scores,
    overall,
    comment
  };
}

// ==================== 5. AI 过程追踪数据生成 ====================

/**
 * AI 过程追踪数据生成 - 模拟学生的平台学习数据
 * 生成登录天数、学习时长、完成度等指标，并判断是否触发掉队预警
 * @param {string} studentId - 学生ID
 * @returns {Object} 学习追踪数据 { loginDays, studyHours, completion, lastLogin, streakDays, warning }
 */
function generateAITrackingData(studentId) {
  // 基于 studentId 生成稳定的随机特征
  let seed = 0;
  for (let i = 0; i < studentId.length; i++) {
    seed += studentId.charCodeAt(i);
  }

  // 登录天数：5-16天（16天满勤）
  const loginDays = random(5, 16);

  // 学习时长：登录天数 * 3-5小时/天
  const hoursPerDay = randomFloat(3, 5, 1);
  const studyHours = Number((loginDays * hoursPerDay).toFixed(1));

  // 仿真训练完成度：60-100%
  // 登录天数多的学生完成度倾向于更高
  const completionBase = Math.floor((loginDays / 16) * 40) + 60;
  const completion = Math.min(100, completionBase + random(-5, 5));

  // 最后登录日期：最近16天内
  const lastLoginOffset = random(0, Math.max(0, 16 - loginDays));
  const lastLoginDate = new Date();
  lastLoginDate.setDate(lastLoginDate.getDate() - lastLoginOffset);
  const lastLogin = formatDate(lastLoginDate);

  // 连续登录天数：0-10天
  // 与总登录天数相关，总天数越多连续天数倾向于越高
  const streakDays = Math.min(random(0, 10), loginDays);

  // 掉队预警判断：连续登录<3天 或 完成度<60%
  const warning = streakDays < 3 || completion < 60;

  return {
    loginDays,
    studyHours,
    completion,
    lastLogin,
    streakDays,
    warning
  };
}

// ==================== 6. 飞行模拟快速评分 ====================

/**
 * 飞行模拟快速评分 - 随机生成飞行实操数据并换算为分数
 * 根据操作准确率、投放误差和特情处置正确率综合评定飞行成绩
 * @param {string} studentId - 学生ID
 * @returns {Object} 飞行评分结果 { accuracy, error, emergency, score, rating }
 */
function quickSimulateScoreCore(studentId) {
  // 基于 studentId 的稳定性因子（0-1之间）
  let seedSum = 0;
  for (let i = 0; i < studentId.length; i++) {
    seedSum += studentId.charCodeAt(i);
  }
  const stability = (seedSum % 100) / 100; // 0-1 的稳定性因子

  // 操作准确率：85-100%
  const accuracy = Math.min(100, Math.floor(85 + stability * 10 + random(-3, 3)));

  // 投放误差：0.5-5.0米（准确率越高误差越小，呈负相关）
  const errorBase = 5.0 - (accuracy - 85) / 15 * 4.5;
  const error = Math.max(0.5, (errorBase + randomFloat(-0.5, 0.5)).toFixed(1));

  // 特情处置正确率：80-100%
  const emergency = Math.min(100, Math.floor(80 + stability * 15 + random(-3, 3)));

  // 根据规则换算为0-15分
  let score;
  let rating;
  if (accuracy >= 95 && parseFloat(error) < 2) {
    // 优秀：13-15分
    score = random(13, 15);
    rating = 'excellent';
  } else if (accuracy >= 90 && parseFloat(error) < 3) {
    // 良好：10-12分
    score = random(10, 12);
    rating = 'good';
  } else if (accuracy >= 85 && parseFloat(error) < 5) {
    // 通过：7-9分
    score = random(7, 9);
    rating = 'pass';
  } else {
    // 需改进：0-6分
    score = random(3, 6);
    rating = 'fail';
  }

  return {
    accuracy,
    error: parseFloat(error),
    emergency,
    score,
    rating
  };
}

// ==================== 7. AI 预警消息生成 ====================

/**
 * AI 预警消息生成 - 扫描所有学生数据，生成预警消息数组
 * 根据多种业务规则检查学生状态，生成对应的预警/提示消息
 * @param {Object} evalData - 评价数据对象，格式为 { studentId: { name, ... }, ... }
 * @returns {Array} 预警消息数组 [{ time, type, message }, ...]
 */
function generateAIWarnings(evalData) {
  const warnings = [];

  // 遍历所有学生数据
  Object.entries(evalData).forEach(([studentId, data]) => {
    const name = data.name || studentId;

    // 规则1：连续3天未登录 → warning
    if (data.streakDays !== undefined && data.streakDays < 3) {
      warnings.push({
        time: randomRecentTime(10),
        type: WARNING_TYPES.WARNING,
        message: `${name}已连续${Math.max(1, 3 - data.streakDays)}天未登录，建议关注`
      });
    }

    // 规则2：仿真训练完成度<60% → warning
    if (data.completion !== undefined && data.completion < 60) {
      warnings.push({
        time: randomRecentTime(10),
        type: WARNING_TYPES.WARNING,
        message: `${name}仿真训练完成度仅${data.completion}%，存在掉队风险`
      });
    }

    // 规则3：wiki未提交 → info
    if (data.wikiSubmitted === false || (data.wikiScore !== undefined && data.wikiScore === 0)) {
      warnings.push({
        time: randomRecentTime(10),
        type: WARNING_TYPES.INFO,
        message: `${name}本周WIKI日志尚未提交`
      });
    }

    // 规则4：安全否决启用 → danger
    if (data.safetyVeto === true || (evalData.safetyVeto && evalData.safetyVeto[studentId])) {
      warnings.push({
        time: randomRecentTime(10),
        type: WARNING_TYPES.DANGER,
        message: `${name}已被安全否决，总评上限59分`
      });
    }

    // 规则5：成绩优秀（总分>=90）→ success
    if (data.totalScore !== undefined && data.totalScore >= 90) {
      warnings.push({
        time: randomRecentTime(10),
        type: WARNING_TYPES.SUCCESS,
        message: `${name}总评${data.totalScore}分，表现优异`
      });
    }

    // 规则6：投放误差<3m → success
    if (data.simError !== undefined && parseFloat(data.simError) < 3) {
      warnings.push({
        time: randomRecentTime(10),
        type: WARNING_TYPES.SUCCESS,
        message: `${name}飞行投放误差仅${data.simError}m，满分时刻！`
      });
    }

    // 规则7：缺少关键词 → info
    if (data.missingKeywords && data.missingKeywords.length > 0) {
      const keyword = data.missingKeywords[0];
      warnings.push({
        time: randomRecentTime(10),
        type: WARNING_TYPES.INFO,
        message: `${name}方案中缺失"${keyword}"，已自动标注`
      });
    }
  });

  // 按时间排序，最近的消息在前
  warnings.sort((a, b) => b.time.localeCompare(a.time));

  return warnings;
}


// ==================== 8. 总评成绩计算 ====================

/**
 * 总评成绩计算 - 严格按照设计方案公式计算学生总评成绩
 * 计算公式：总评 = 过程性得分 * 0.4 + 结果性得分 * 0.6 + 附加分（上限10分）
 * 安全否决时总评上限59分
 * @param {string} studentId - 学生ID
 * @param {Object} evalData - 评价数据对象
 * @returns {Object} 成绩计算结果 { processScore, resultScore, developmentBonus, totalScore, isVetoed, grade }
 */
function calculateTotalScoreCore(studentId, evalData) {
  const data = evalData[studentId];
  if (!data) {
    return { processScore: 0, resultScore: 0, developmentBonus: 0, totalScore: 0, isVetoed: false, grade: '预警' };
  }

  // 1. 过程性得分 = wikiScore(30) + presentationScore(30) + selfContributionScore(40) = 100分满分
  const wikiScore = data.wikiScore !== undefined ? Math.min(data.wikiScore, 30) : 0;
  const presentationScore = data.presentationScore !== undefined ? Math.min(data.presentationScore, 30) : 0;
  const selfContributionScore = data.selfContributionScore !== undefined ? Math.min(data.selfContributionScore, 40) : 0;
  const processScore = wikiScore + presentationScore + selfContributionScore;

  // 2. 结果性得分 = 各项之和，满分100分
  // 具体构成：planDoc(15) + packagePlan(30) + dispatchPlan(10) + simulation(15) + realFlight(25) +
  //            multiDrone(10) + defensePPT(20) + teamShow(10) + ideology(5) = 100分满分
  const planDoc = data.planDoc || 0;
  const packagePlan = data.packagePlan || 0;
  const dispatchPlan = data.dispatchPlan || 0;
  const simulation = data.simulation || 0;
  const realFlight = data.realFlight || 0;
  const multiDrone = data.multiDrone || 0;
  const defensePPT = data.defensePPT || 0;
  const teamShow = data.teamShow || 0;
  const ideology = data.ideology || 0;
  const resultScore = planDoc + packagePlan + dispatchPlan + simulation + realFlight +
                     multiDrone + defensePPT + teamShow + ideology;

  // 3. 附加分 = 真实用户加分 + 技术突破加分 + 管理加分（上限10分）
  const realUser = (data.developmentBonus && data.developmentBonus.realUser) || 0;
  const techBreakthrough = (data.developmentBonus && data.developmentBonus.techBreakthrough) || 0;
  const management = (data.developmentBonus && data.developmentBonus.management) || 0;
  const developmentBonus = Math.min(realUser + techBreakthrough + management, 10);

  // 4. 总评 = process * 0.4 + result * 0.6 + developmentBonus
  let totalScore = Math.round((processScore * 0.4 + resultScore * 0.6 + developmentBonus) * 10) / 10;
  // 四舍五入到1位小数
  totalScore = Math.round(totalScore * 10) / 10;

  // 5. 安全否决检查
  const isVetoed = (evalData.safetyVeto && evalData.safetyVeto[studentId] === true) || data.safetyVeto === true;
  if (isVetoed) {
    totalScore = Math.min(totalScore, 59);
  }

  // 6. 确定等级
  let grade;
  if (totalScore >= 90) {
    grade = '优秀';
  } else if (totalScore >= 80) {
    grade = '良好';
  } else if (totalScore >= 70) {
    grade = '中等';
  } else if (totalScore >= 60) {
    grade = '及格';
  } else {
    grade = '预警';
  }

  return {
    processScore,
    resultScore,
    developmentBonus,
    totalScore,
    isVetoed,
    grade
  };
}

// ==================== 9. 班级统计数据计算 ====================

/**
 * 班级统计数据计算 - 汇总全班学生的评价数据
 * 计算平均分、成绩分布、指标达成度和雷达图数据
 * @param {Object} evalData - 评价数据对象，包含所有学生的完整评价信息
 * @returns {Object} 班级统计数据 { totalStudents, avgScore, distribution, indicators, warningCount, radarData }
 */
function calculateClassStats(evalData) {
  // 过滤出有效学生数据条目（排除 safetyVeto 等特殊键）
  const studentEntries = Object.entries(evalData).filter(([key]) => key !== 'safetyVeto');
  const totalStudents = studentEntries.length;

  if (totalStudents === 0) {
    return {
      totalStudents: 0,
      avgScore: 0,
      distribution: { excellent: 0, good: 0, medium: 0, pass: 0, warning: 0 },
      indicators: { planCompliance: 0, deliveryAccuracy: 0, airspacePass: 0 },
      warningCount: 0,
      radarData: [0, 0, 0, 0, 0, 0]
    };
  }

  // 计算每个学生的总分并收集各项分数
  const allScores = [];
  const allPlanDoc = [];
  const allDispatchPlan = [];
  const allMultiDrone = [];
  const allSimulation = [];
  const allRealFlight = [];
  const allTeamShow = [];
  const allSelfContribution = [];
  const allIdeology = [];
  let warningCount = 0;

  studentEntries.forEach(([studentId, data]) => {
    const score = calculateTotalScore(studentId, evalData);
    allScores.push(score.totalScore);

    // 收集各项原始分数用于雷达图计算
    allPlanDoc.push(data.planDoc || 0);
    allDispatchPlan.push(data.dispatchPlan || 0);
    allMultiDrone.push(data.multiDrone || 0);
    allSimulation.push(data.simulation || 0);
    allRealFlight.push(data.realFlight || 0);
    allTeamShow.push(data.teamShow || 0);
    allSelfContribution.push(data.selfContributionScore || 0);
    allIdeology.push(data.ideology || 0);

    // 统计预警人数
    if (score.grade === '预警') {
      warningCount++;
    }
  });

  // 计算班级平均分
  const avgScore = Math.round((allScores.reduce((a, b) => a + b, 0) / totalStudents) * 10) / 10;

  // 成绩分布统计
  const distribution = { excellent: 0, good: 0, medium: 0, pass: 0, warning: 0 };
  allScores.forEach(score => {
    if (score >= 90) distribution.excellent++;
    else if (score >= 80) distribution.good++;
    else if (score >= 70) distribution.medium++;
    else if (score >= 60) distribution.pass++;
    else distribution.warning++;
  });

  // 指标达成度（随机模拟，体现业务数据波动）
  const indicators = {
    planCompliance: random(85, 98),     // 方案合规率 %
    deliveryAccuracy: random(82, 96),   // 投放精准度 %
    airspacePass: random(78, 90)        // 空域通过率 %
  };

  // 雷达图6维度计算
  const avg = arr => arr.reduce((a, b) => a + b, 0) / arr.length;

  const radarData = [
    Math.round(avg(allPlanDoc) / 15 * 100),                       // 应急方案制定 = planDoc平均 / 15 * 100
    Math.round(avg(allDispatchPlan) / 10 * 100),                  // 航线规划 = dispatchPlan平均 / 10 * 100
    Math.round(avg(allMultiDrone) / 10 * 100),                    // 设备运维 = multiDrone平均 / 10 * 100
    Math.round(avg([...allSimulation, ...allRealFlight]) / 40 * 100), // 飞行操控 = (simulation+realFlight)平均 / 40 * 100
    Math.round(avg([...allTeamShow, ...allSelfContribution]) / 25 * 100), // 团队协作 = (teamShow+selfContribution)平均 / 25 * 100
    Math.round(avg(allIdeology) / 5 * 100)                        // 安全意识 = ideology平均 / 5 * 100
  ];

  // 雷达图维度标签（与数据对应）
  const radarDimensions = ['应急方案制定', '航线规划', '设备运维', '飞行操控', '团队协作', '安全意识'];

  return {
    totalStudents,
    avgScore,
    distribution,
    indicators,
    warningCount,
    radarData,
    radarDimensions
  };
}

// ==================== 10. 热力图数据生成 ====================

/**
 * 热力图数据生成 - 生成学生 x 周数的活跃度热力图数据
 * 活跃度评分基于登录、学习时长、wiki提交和仿真完成情况
 * @param {Array} students - 学生列表，每项为 { id, name }
 * @param {number} weeks - 周数，默认8周
 * @returns {Object} 热力图数据 { xData, yData, data }
 *   xData: 周次标签数组
 *   yData: 学生姓名数组
 *   data: [[x索引, y索引, 活跃度分数], ...]
 */
function generateHeatmapData(students, weeks = 8) {
  // X轴：周次标签
  const xData = Array.from({ length: weeks }, (_, i) => `第${i + 1}周`);

  // Y轴：学生姓名
  const yData = students.map(s => s.name);

  // 生成热力图数据点 [x, y, value]
  const data = [];
  students.forEach((student, yIndex) => {
    // 为每个学生生成一个基础活跃度特征（有的学生整体活跃，有的偏懒散）
    const studentBaseActivity = random(40, 90);

    for (let week = 0; week < weeks; week++) {
      let activityScore = studentBaseActivity;

      // 添加周间波动（期中前后活跃度可能变化）
      if (week === 0 || week === weeks - 1) {
        // 开学和期末通常活跃度更高
        activityScore += random(5, 15);
      } else if (week === Math.floor(weeks / 2)) {
        // 期中可能略有下降
        activityScore -= random(0, 10);
      }

      // 逐周添加小幅随机波动，保持一定连续性
      activityScore += random(-10, 10);

      // 活跃度评分规则（0-100）：
      // 登录+20，学习时长>3h +20，wiki已提交 +30，仿真完成 +30
      // 模拟时按随机规则生成，但受上述activityScore影响

      // 模拟各项子指标的随机贡献
      const hasLogin = activityScore > 30; // 活跃度高的学生倾向于登录
      const studyHours = hasLogin ? random(1, 6) : 0;
      const wikiSubmitted = activityScore > 50; // 活跃度中等以上才提交wiki
      const simCompleted = activityScore > 60; // 活跃度较高才完成仿真

      // 计算该周的活跃度分数
      let score = 0;
      if (hasLogin) score += 20;
      if (studyHours > 3) score += 20;
      if (wikiSubmitted) score += 30;
      if (simCompleted) score += 30;

      // 在基础分数上添加随机扰动，模拟数据不完全理想的情况
      score = Math.max(0, Math.min(100, score + random(-10, 10)));

      data.push([week, yIndex, score]);
    }
  });

  return {
    xData,
    yData,
    data
  };
}

// ==================== 11. 协作网络数据生成 ====================

/**
 * 协作网络数据生成 - 生成小组内学生协作关系数据
 * 节点大小根据贡献分映射，链接根据互评分数映射协作强度
 * @param {string} groupId - 小组ID
 * @param {Object} evalData - 评价数据对象
 * @returns {Object} 协作网络数据 { nodes, links }
 *   nodes: [{ id, name, value:贡献分, symbolSize }, ...]
 *   links: [{ source, target, value:协作频次 }, ...]
 */
function generateCollaborationData(groupId, evalData) {
  // 从 evalData 中筛选出该小组的学生
  // evalData 格式假设包含 groupId 字段或单独的分组信息
  // 如果没有分组信息，则取前4-6个学生作为一个模拟小组

  const allEntries = Object.entries(evalData).filter(([key]) => key !== 'safetyVeto');

  // 按 groupId 筛选，如果无法筛选则使用全部学生
  let groupMembers = allEntries.filter(([_, data]) => data.groupId === groupId);

  // 如果该小组没有成员，取前6个学生作为模拟小组
  if (groupMembers.length === 0) {
    groupMembers = allEntries.slice(0, 6);
  }

  // 生成节点数据
  const nodes = groupMembers.map(([studentId, data], index) => {
    // 贡献分：10-20分范围（来自 selfContributionScore 或随机生成）
    const contributionScore = data.selfContributionScore || random(10, 20);

    // 节点大小映射：贡献分10-20分 → 符号大小30-70像素
    const symbolSize = Math.round(30 + (contributionScore - 10) / 10 * 40);

    return {
      id: studentId,
      name: data.name || `学生${index + 1}`,
      value: contributionScore,
      symbolSize: symbolSize
    };
  });

  // 生成链接数据（两两之间的协作关系）
  const links = [];
  const nodeIds = nodes.map(n => n.id);

  // 为每对学生生成协作链接
  for (let i = 0; i < nodeIds.length; i++) {
    for (let j = i + 1; j < nodeIds.length; j++) {
      const source = nodeIds[i];
      const target = nodeIds[j];

      // 从 evalData 中获取互评分数，如果没有则随机生成
      const sourceData = evalData[source] || {};
      const targetData = evalData[target] || {};

      // 协作频次：基于互评分数映射（1-10次）
      // 如果有 peerReview 数据则使用，否则随机生成
      let collaborationFreq;
      if (sourceData.peerReview && sourceData.peerReview[target] !== undefined) {
        collaborationFreq = Math.round(sourceData.peerReview[target] / 10);
      } else {
        // 随机协作频次，高贡献学生之间倾向于协作更多
        const sourceContribution = nodes.find(n => n.id === source)?.value || 15;
        const targetContribution = nodes.find(n => n.id === target)?.value || 15;
        const avgContribution = (sourceContribution + targetContribution) / 2;
        collaborationFreq = Math.round(avgContribution / 20 * 8) + random(1, 3);
      }

      collaborationFreq = Math.max(1, Math.min(10, collaborationFreq));

      links.push({
        source,
        target,
        value: collaborationFreq
      });
    }
  }

  // 筛选出协作频次较高的链接（去除弱连接，使网络更清晰）
  const strongLinks = links.filter(l => l.value >= 3);
  // 如果筛选后链接太少，保留原始链接
  const finalLinks = strongLinks.length >= nodeIds.length ? strongLinks : links;

  return {
    nodes,
    links: finalLinks
  };
}

/**
 * 计算成绩分布统计
 * @param {number[]} scores - 总评成绩数组
 * @returns {number[]} 各区间人数 [优秀, 良好, 中等, 及格, 预警]
 */
function computeGradeStats(scores) {
  const stats = [0, 0, 0, 0, 0]; // 优秀, 良好, 中等, 及格, 预警
  scores.forEach(s => {
    if (s >= 90) stats[0]++;
    else if (s >= 80) stats[1]++;
    else if (s >= 70) stats[2]++;
    else if (s >= 60) stats[3]++;
    else stats[4]++;
  });
  return stats;
}

            borderWidth: 2,

            fontSize: 11,
            fontWeight: 'bold'
          },
          group: g.name
        });

    });

  // 构建边
  const edges = linksData.map(l => ({
    source: l.source,
    target: l.target,
    value: l.value,

      curveness: 0.2,

          const n = params.data;
          return `<strong>${n.name}</strong><br/>贡献分：${n.value}<br/>所属组：${n.group || '无'}`;
        }
        if (params.dataType === 'edge') {
          return `<strong>协作关系</strong><br/>${params.data.source} ↔ ${params.data.target}<br/>互动频次：${params.data.value} 次`;
        }
        return '';
      }
    },
    legend: {
      data: groups.map(g => g.name),
      textStyle: { color: '#8b9dc3' },
      bottom: 5,
      itemWidth: 14,
      itemHeight: 14
    },
    series: [{
      type: 'graph',
      layout: 'force',
      roam: true,
      draggable: true,
      focusNodeAdjacency: true,
      data: nodes,
      links: edges,
      categories: groups.map(g => ({ name: g.name, itemStyle: { color: g.color } })),
      force: {
        repulsion: 300,
        gravity: 0.1,
        edgeLength: [60, 180],
        layoutAnimation: true

}

/**
 * 更新团队协作网络图数据
 * @param {Object} chart - ECharts 实例
 * @param {Object} newGroupData - 新的团队数据
 */
function updateCollaborationNetwork(chart, newGroupData) {
  if (!chart) return;
  const groups = newGroupData.groups || [];
  const linksData = newGroupData.links || [];

  const nodes = [];
  const nodeSet = new Set();
  groups.forEach(g => {
    g.members.forEach(m => {
      if (!nodeSet.has(m.name)) {
        nodeSet.add(m.name);
        nodes.push({
          name: m.name,
          value: m.contribution,
          symbolSize: 20 + m.contribution * 0.5,
          itemStyle: {
            color: g.color,
            borderColor: '#0a1628',
            borderWidth: 2,
            shadowColor: g.color + '88',
            shadowBlur: 12
          },
          label: {
            show: true,
            formatter: '{b}\n{c}分',
            color: '#e0e8f0',
            fontSize: 11,
            fontWeight: 'bold'
          },
          group: g.name
        });
      }
    });
  });

  const edges = linksData.map(l => ({
    source: l.source,
    target: l.target,
    value: l.value,
    lineStyle: {
      width: Math.max(1, Math.min(l.value * 0.5, 8)),
      curveness: 0.2,
      color: 'rgba(0,212,255,0.4)'
    },
    label: {
      show: true,
      formatter: '{c}次',
      color: '#8b9dc3',
      fontSize: 10
    }
  }));

  chart.setOption({
    series: [{
      data: nodes,
      links: edges,
      categories: groups.map(g => ({ name: g.name, itemStyle: { color: g.color } }))
    }]
  });
}

/**
 * 渲染低参与度预警卡片
 * @param {string} containerId - 容器 div 的 ID
 * @param {Object[]} warningStudents - 预警学生数组
 *   例: [
 *     { name: '张三', absentDays: 7, suggestion: '建议联系辅导员' },
 *     { name: '李四', absentDays: 5, suggestion: '建议电话沟通' }
 *   ]
 */
function renderWarningCards(containerId, warningStudents) {
  const container = document.getElementById(containerId);
  if (!container) return;

  // 清空容器
  container.innerHTML = '';

  if (!warningStudents || warningStudents.length === 0) {
    container.innerHTML = '<div style="color:#8b9dc3;text-align:center;padding:20px;">暂无预警学生</div>';
    return;
  }

  // 添加标题
  const titleEl = document.createElement('div');
  titleEl.style.cssText = 'color:#ff5252;font-size:14px;font-weight:bold;margin-bottom:12px;display:flex;align-items:center;gap:6px;';
  titleEl.innerHTML = '<span style="font-size:18px;">&#9888;</span> 低参与度预警学生 (' + warningStudents.length + '人)';
  container.appendChild(titleEl);

  warningStudents.forEach((student, index) => {
    const card = document.createElement('div');
    card.className = 'warning-card';
    card.style.cssText = `
      background: rgba(255,82,82,0.08);
      border: 1px solid rgba(255,82,82,0.4);
      border-radius: 8px;
      padding: 12px 14px;
      margin-bottom: 8px;
      animation: warningPulse 2s infinite;
      animation-delay: ${index * 0.3}s;
      transition: all 0.3s ease;
      cursor: pointer;
    `;

    card.innerHTML = `
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">
        <span style="color:#e0e8f0;font-weight:bold;font-size:14px;">${student.name}</span>
        <span style="color:#ff5252;font-size:12px;font-weight:bold;">${student.absentDays}天未登录</span>
      </div>
      <div style="color:#8b9dc3;font-size:12px;">${student.suggestion}</div>
    `;

    // 悬停效果
    card.addEventListener('mouseenter', () => {
      card.style.background = 'rgba(255,82,82,0.15)';
      card.style.borderColor = 'rgba(255,82,82,0.7)';
      card.style.transform = 'translateX(4px)';
    });
    card.addEventListener('mouseleave', () => {
      card.style.background = 'rgba(255,82,82,0.08)';
      card.style.borderColor = 'rgba(255,82,82,0.4)';
      card.style.transform = 'translateX(0)';
    });

    container.appendChild(card);
  });

  // 添加闪烁动画（如果未添加过）
  if (!document.getElementById('warning-card-styles')) {
    const style = document.createElement('style');
    style.id = 'warning-card-styles';
    style.textContent = `
      @keyframes warningPulse {
        0%, 100% { box-shadow: 0 0 4px rgba(255,82,82,0.2); border-color: rgba(255,82,82,0.4); }
        50% { box-shadow: 0 0 12px rgba(255,82,82,0.4); border-color: rgba(255,82,82,0.7); }
      }
    `;
    document.head.appendChild(style);
  }
}

// ==============================================

/**
 * 初始化 AI 预警事件流
 * @param {string} containerId - 容器 div 的 ID
 * @param {Object[]} events - 事件数组
 *   例: [
 *     { time: '10:23', type: 'warning', message: '张三连续7天未登录系统' },
 *     { time: '10:15', type: 'info', message: '李四完成了航线规划作业' },
 *     { time: '09:48', type: 'success', message: '第一组全员提交阶段性报告' }
 *   ]
 *   type 可选值: 'warning' | 'info' | 'success'
 * @returns {Object} 事件流控制器对象，包含 addEvent 方法
 */
function initEventStream(containerId, events) {
  const container = document.getElementById(containerId);
  if (!container) return null;

  // 清空容器
  container.innerHTML = '';

  // 创建事件流容器
  const streamContainer = document.createElement('div');
  streamContainer.id = containerId + '-stream';
  streamContainer.style.cssText = `
    height: 100%;
    overflow: hidden;
    position: relative;
    display: flex;
    flex-direction: column;
  `;
  container.appendChild(streamContainer);

  // 类型颜色配置
  const typeColors = {
    warning: { border: '#ff5252', bg: 'rgba(255,82,82,0.08)', icon: '&#9888;' },
    info:    { border: '#00d4ff', bg: 'rgba(0,212,255,0.08)', icon: '&#9432;' },
    success: { border: '#00e676', bg: 'rgba(0,230,118,0.08)', icon: '&#10004;' }
  };

  // 渲染单个事件
  function renderEventItem(event, animate) {
    const cfg = typeColors[event.type] || typeColors.info;
    const item = document.createElement('div');
    item.style.cssText = `
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 8px 10px;
      margin-bottom: 6px;
      border-left: 3px solid ${cfg.border};
      background: ${cfg.bg};
      border-radius: 0 6px 6px 0;
      transition: all 0.3s ease;
      animation: ${animate ? 'slideInUp 0.5s ease-out' : 'none'};
      flex-shrink: 0;
    `;
    item.innerHTML = `
      <span style="color:${cfg.border};font-size:14px;margin-top:2px;">${cfg.icon}</span>
      <div style="flex:1;min-width:0;">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:2px;">
          <span style="color:#8b9dc3;font-size:11px;">${event.time}</span>
          <span style="color:${cfg.border};font-size:10px;text-transform:uppercase;font-weight:bold;">${event.type}</span>
        </div>
        <div style="color:#e0e8f0;font-size:12px;word-break:break-word;">${event.message}</div>
      </div>
    `;

    // 悬停效果
    item.addEventListener('mouseenter', () => {
      item.style.background = cfg.bg.replace(/0\.08/, '0.2');
    });
    item.addEventListener('mouseleave', () => {
      item.style.background = cfg.bg;
    });

    return item;
  }

  // 添加滑动动画样式
  if (!document.getElementById('event-stream-styles')) {
    const style = document.createElement('style');
    style.id = 'event-stream-styles';
    style.textContent = `
      @keyframes slideInUp {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
      }
      @keyframes slideOutUp {
        from { opacity: 1; transform: translateY(0); max-height: 100px; margin-bottom: 6px; }
        to { opacity: 0; transform: translateY(-20px); max-height: 0; margin-bottom: 0; padding: 0; }
      }
    `;
    document.head.appendChild(style);
  }

  // 初始渲染（倒序，最新消息在底部）
  const eventsToRender = (events || []).slice(0, 20);
  eventsToRender.forEach(ev => {
    streamContainer.appendChild(renderEventItem(ev, false));
  });

  // 自动滚动到最新
  setTimeout(() => {
    streamContainer.scrollTop = streamContainer.scrollHeight;
  }, 100);

  // 返回控制器对象
  return {
    container: streamContainer,
    typeColors,
    maxItems: 20,

    /**
     * 添加新事件
     * @param {Object} event - 新事件 { time, type, message }
     */
    addEvent: function (event) {
      const stream = document.getElementById(containerId + '-stream');
      if (!stream) return;

      const item = renderEventItem(event, true);
      stream.appendChild(item);

      // 超出限制时移除旧的
      const items = stream.children;
      while (items.length > this.maxItems) {
        const first = items[0];
        first.style.animation = 'slideOutUp 0.4s ease-in forwards';
        setTimeout(() => {
          if (first.parentNode) first.parentNode.removeChild(first);
        }, 400);
      }

      // 平滑滚动到最新
      stream.scrollTo({ top: stream.scrollHeight, behavior: 'smooth' });
    },

    /**
     * 批量更新事件
     * @param {Object[]} newEvents - 新事件数组
     */
    update: function (newEvents) {
      const stream = document.getElementById(containerId + '-stream');
      if (!stream) return;
      stream.innerHTML = '';
      const eventsToRender = (newEvents || []).slice(0, 20);
      eventsToRender.forEach(ev => {
        stream.appendChild(renderEventItem(ev, false));
      });
      stream.scrollTop = stream.scrollHeight;
    }
  };
}

/**
 * 更新 AI 预警事件流
 * @param {Object} streamController - initEventStream 返回的控制器对象
 * @param {Object[]} newEvents - 新事件数组
 */
function updateEventStream(streamController, newEvents) {
  if (streamController && streamController.update) {
    streamController.update(newEvents);
  }
}

// ==============================================
// 便捷初始化函数：一键初始化所有图表
// ==============================================

/**
 * 一键初始化所有图表（用于快速演示）
 * @param {Object} containerIds - 各图表容器 ID 映射
 *   例: {
 *     grade: 'grade-chart',
 *     gauges: 'gauges-chart',
 *     heatmap: 'heatmap-chart',
 *     network: 'network-chart',
 *     radar: 'radar-chart',
 *     warning: 'warning-container',
 *     events: 'events-container'
 *   }
 * @returns {Object} 所有图表实例和控制器的引用
 */
function initAllCharts(containerIds) {
  const mock = generateMockChartData();

  const charts = {};

  if (containerIds.grade) {
    charts.grade = initGradeDistribution(containerIds.grade, mock.gradeData);
  }
  if (containerIds.gauges) {
    charts.gauges = initIndicatorGauges(containerIds.gauges, mock.indicators);
  }
  if (containerIds.heatmap) {
    charts.heatmap = initHeatmap(containerIds.heatmap, mock.heatmapData);
  }
  if (containerIds.network) {
    charts.network = initCollaborationNetwork(containerIds.network, mock.groupData);
  }
  if (containerIds.radar) {
    charts.radar = initRadarChart(containerIds.radar, mock.radarData.classAvg, mock.radarData.targetProfile);
  }
  if (containerIds.warning) {
    renderWarningCards(containerIds.warning, mock.warningStudents);
    charts.warning = { update: (data) => updateWarningCards(containerIds.warning, data) };
  }
  if (containerIds.events) {
    charts.events = initEventStream(containerIds.events, mock.events);
  }

  // 窗口大小改变时自动重绘
  window.addEventListener('resize', () => {
    Object.values(charts).forEach(c => {
      if (c && typeof c.resize === 'function') {
        c.resize();
      }
    });
  });

  // 将 update 函数绑定到 charts 对象上
  charts.updateGrade = (d) => updateGradeDistribution(charts.grade, d);
  charts.updateGauges = (d) => updateIndicatorGauges(charts.gauges, d);
  charts.updateHeatmap = (d) => updateHeatmap(charts.heatmap, d);
  charts.updateNetwork = (d) => updateCollaborationNetwork(charts.network, d);
  charts.updateRadar = (c, t) => updateRadarChart(charts.radar, c, t);
  charts.updateEvents = (e) => { if (charts.events) charts.events.update(e); };

  return charts;
}
